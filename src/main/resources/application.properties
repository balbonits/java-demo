spring.application.name=mediaops
server.port=8081

# Connect to the existing video_catalog Postgres (Docker container from postgresql-demo repo)
spring.datasource.url=jdbc:postgresql://localhost:5432/video_catalog
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate / JPA
# 'validate' = error on schema mismatch (production-safer); use 'update' to add new tables for AvailabilityWindow/AssetState extensions
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Naming: existing tables use snake_case (videos, plays, video_id, played_at)
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

logging.level.org.hibernate.SQL=DEBUG
